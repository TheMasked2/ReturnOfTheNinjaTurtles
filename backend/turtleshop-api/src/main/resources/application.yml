spring:
  datasource:
    # Prefer Spring’s standard env vars; compose already sets these.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Allows Flyway to run even if the database already has tables
    # (very useful if you created tables manually before adding Flyway)
    baseline-on-migrate: true
    # Ensures the migration script hasn't been tampered with
    validate-on-migrate: true

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
    org.springframework.boot.autoconfigure.jdbc: DEBUG
    org.springframework.jdbc: DEBUG

app:
  auth:
    issuer: "turtleshop-api"
    accessTtlSeconds: 900
    refreshTtlSeconds: 1209600
    secureCookies: false  # dev over http; set true when https
    cookie-same-site: Lax

server:
  port: 8080