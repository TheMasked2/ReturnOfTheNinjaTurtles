services:
  db:
    image: postgres:16
    container_name: turtleshop-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5437:5432"
    volumes:
      - turtleshop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:latest
    container_name: turtleshop-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: turtleshop
    ports:
      - "27017:27017"
    volumes:
      - ./backend/turtleshop-api/src/main/resources/db/mongodb:/docker-entrypoint-initdb.d
    healthcheck:
      test: mongosh --quiet --eval "db.adminCommand('ping')"
      interval: 5s
      timeout: 5s
      retries: 5

  download-driver:
    image: alpine:latest
    container_name: turtleshop-driver-downloader
    command: sh -c "apk add --no-cache curl && curl -o /plugins/postgresql-42.7.2.jar https://jdbc.postgresql.org/download/postgresql-42.7.2.jar"
    volumes:
      - turtleshop_neo4j_plugins:/plugins

  neo4j:
    image: neo4j:5.12.0-community
    container_name: turtleshop-neo4j
    ports:
      - "7474:7474" 
      - "7687:7687" 
    environment:
      - NEO4J_AUTH=neo4j/${DB_PASSWORD}
      - NEO4J_PLUGINS=["apoc", "apoc-extended"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - turtleshop_neo4j_data:/data
      - turtleshop_neo4j_logs:/logs
      - turtleshop_neo4j_plugins:/plugins
    init: true
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  api:
    build:
      context: ./backend/turtleshop-api
      dockerfile: Dockerfile
      target: dev
    container_name: turtleshop-api
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/turtleshop?authSource=admin
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    ports:
      - "8080:8080"
    volumes:
      - ./backend/turtleshop-api:/app
      - /app/.gradle
      - /app/build
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/swagger-ui/index.html || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  seeder:
    image: python:3.11-slim
    container_name: turtleshop-seeder
    volumes:
      - .:/app
    working_dir: /app/seeder
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python seed_data.py"
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=${DB_SEEDER_PORT}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
    depends_on:
      api:
        condition: service_healthy

  mongo-express:
    image: mongo-express
    container_name: turtleshop-mongo-gui
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: "${MONGO_USER}"
      ME_CONFIG_BASICAUTH_PASSWORD: "${MONGO_PASSWORD}"
      ME_CONFIG_MONGODB_SERVER: "mongodb"
      ME_CONFIG_MONGODB_ADMINUSERNAME: "${MONGO_USER}"
      ME_CONFIG_MONGODB_ADMINPASSWORD: "${MONGO_PASSWORD}"
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy

  redis:
    image: redis:7.2-alpine
    container_name: turtleshop-redis
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lfu
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "executable", "arg"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    

  frontend:
    build:
      context: ./frontend/turtleshop-web
      dockerfile: Dockerfile
    container_name: turtleshop-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/turtleshop-web:/app
      - /app/node_modules
    depends_on:
      seeder:
        condition: service_completed_successfully

volumes:
  turtleshop_pgdata:
  turtleshop_mongodb_data:
  redis_data:
  turtleshop_neo4j_data:
  turtleshop_neo4j_logs:
  turtleshop_neo4j_plugins:
